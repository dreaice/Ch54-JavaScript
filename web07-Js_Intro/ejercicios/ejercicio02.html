<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web07 - Ejercicio 02</title>
    <script>
        function mostrarAlerta() {
            alert("¡Hola, mundo!");
        }
        function cambiarColorFondo() {
            document.body.style.backgroundColor = "lightblue";
        }
        function cambiarTexto() {
            document.body.innerHTML = "<h1>¡Texto cambiado!</h1>";
        }
    </script>
</head>
<body>
  <h1>Ejercicio 02 </h1>
    <button onclick="mostrarAlerta()">Mostrar Alerta</button>
    <!--Agregar dos botones que llamen a la función CambiarColorFondo()-->
    <!--Agregar dos botones que llamen a la función CambiarTexto()-->

    <button onclick="cambiarColorFondo()"> Cambiar color de fondo</button>
    <button onclick="cambiarTexto()">Mostrar texto</button>

        <!-- Agregar un nuevo tag Script y agregar una función que cambie el background de body
         a otro color ej. blue.
         Agregar un botón que llame a esa función para cambiar el color de fondo 
    -->
         <script>
            function recambioColorFondo(){
                document.body.style.backgroundColor = "green";
            }
         </script>
         <button onclick="recambioColorFondo()">Vuelve a cambiar el color de fondo</button>
</body>
</html>
